{% extends "base.html" %}
{% load django_bootstrap5 %}

{% block title %} Register {% endblock title %}

{% block content1 %}

    <h3>Registration</h3>

    <div>
        <form action="{% url "accounts:register" %}" method="post">
            {% csrf_token %}
            {% bootstrap_form form %}
            {% bootstrap_button button_type="submit" content="Register" %}
        </form>
    </div>

{% endblock content1 %}
